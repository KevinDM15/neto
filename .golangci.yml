run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  goimports:
    local-prefixes: github.com/neto-app/neto

issues:
  exclude-dirs:
    - vendor
  exclude-generated: strict
